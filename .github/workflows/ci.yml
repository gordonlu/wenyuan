name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - run: mkdir -p web/dist && touch web/dist/index.html
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - run: cargo build --workspace
      - run: cargo test --workspace

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npx vue-tsc --noEmit
      - run: pnpm test
      - run: pnpm build

  desktop-macos:
    runs-on: macos-latest
    needs: [backend, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && pnpm install --frozen-lockfile && pnpm build
        working-directory: web
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: npm install && npx tauri build
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: wenyuan-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  desktop-windows:
    runs-on: windows-latest
    needs: [backend, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && pnpm install --frozen-lockfile && pnpm build
        working-directory: web
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: npm install && npx tauri build
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: wenyuan-windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

  desktop-linux:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && pnpm install --frozen-lockfile && pnpm build
        working-directory: web
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: npm install && npx tauri build
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: wenyuan-linux
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm


